# ----------------------------------------------------- 
# Window rules
# ----------------------------------------------------- 
# Updated to use new windowrule syntax from Hyprland documentation
# Rules are evaluated top to bottom

# PwVuControl volume mixer
windowrule {
  name = pwvucontrol-float
  match:class = com.saivert.pwvucontrol
  
  float = on
  center = on
}

# Emacs minibuffer
windowrule {
  name = emacs-minibuf
  match:title = \*Minibuf-0\*
  
  float = on
  size = 500 200
  move = (monitor_w*0.5-250) (monitor_h*0.3)
}

# Emacs completions window
windowrule {
  name = emacs-completions
  match:title = \*Completions\*
  
  float = on
  size = 406 900
  move = 1331 -70
}

# Jetpack (Firefox popup)
windowrule {
  name = jetpack-float
  match:title = Jetpack
  
  float = on
}

# Emacs opacity override
windowrule {
  name = emacs-opacity
  match:class = Emacs
  
  opacity = 2.0 override
}

# Krell Top floating
windowrule {
  name = krell-top-float
  match:class = .*Krell Top
  
  float = on
}

